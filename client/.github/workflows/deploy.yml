name: CI/CD Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      manual_rollback:
        description: "English content normalized from the original source text."
        required: false

jobs:
  # 1. Build & Test
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      # - name: Run tests
      #   run: npm test

  # 2. Deploy to Production
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !github.event.inputs.manual_rollback) }}
    environment: staging
    env:
      NODE_ENV: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Deploy via SSH & PM2
        id: ssh_deploy
        run: |
          sshpass -p "${{ secrets.STAGING_VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_VPS_USERNAME }}@${{ secrets.STAGING_VPS_IP_HOST }} << 'EOF'
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            source ~/.bashrc; source ~/.profile
            English content normalized from the original source text.
            if ! command -v jq &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y jq
            fi
            cd ${{ secrets.STAGING_PATH_PROJECT }}
            git fetch origin master && git reset --hard origin/master
            rm -rf .next node_modules
            npm ci && npm run build
            pm2 describe client-ecsite &>/dev/null && pm2 restart client-ecsite || pm2 start dist/main.js --name client-ecsite
            English content normalized from the original source text.
            sleep 12
            English content normalized from the original source text.
            pm2 jlist > /tmp/pm2_status.json
            English content normalized from the original source text.
            pm2 logs client-ecsite --lines 100 --nostream > /tmp/pm2_logs.txt
            STATUS=$(pm2 info client-ecsite | grep status | awk '{print $4}')
            echo "$STATUS" > /tmp/app_status.txt
            if [[ "$STATUS" != "online" ]]; then
              exit 2
            fi
          EOF
        continue-on-error: true

      - name: Collect PM2 Output
        if: always()
        id: pm2_logs
        run: |
          sshpass -p "${{ secrets.STAGING_VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_VPS_USERNAME }}@${{ secrets.STAGING_VPS_IP_HOST }} << 'EOF'
            English content normalized from the original source text.
            PM2_INFO=$(jq -r '.[] | select(.name == "client-ecsite") | "Name: \(.name)\nStatus: \(.pm2_env.status)\nPID: \(.pid)\nUptime: \(.pm2_env.uptime // 0 | tostring + \"ms\")\nCPU: \(.monit.cpu)%\nMemory: \(.monit.memory / 1024 / 1024 | tostring + \"MB\")"' /tmp/pm2_status.json 2>/dev/null)
            if [ -z "$PM2_INFO" ]; then
              PM2_INFO="English content normalized from the original source text."
            fi
            echo "::set-output name=pm2_info::$PM2_INFO"
            English content normalized from the original source text.
            if [ -f /tmp/pm2_logs.txt ]; then
              PM2_LOGS=$(grep -v '\[TAILING\]' /tmp/pm2_logs.txt | tail -n 100)
              if [ -z "$PM2_LOGS" ]; then
                PM2_LOGS="English content normalized from the original source text."
              fi
            else
              PM2_LOGS="English content normalized from the original source text."
            fi
            echo "::set-output name=pm2_logs::$PM2_LOGS"
          EOF

      - name: Tag Release
        if: success()
        run: |
          TAG=v$(date +'%Y.%m.%d.%H%M%S')
          git tag $TAG
          git push origin $TAG

      - name: Get Commit Info
        id: commit_info
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Discord Embed Notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ job.status }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          PM2_INFO: ${{ steps.pm2_logs.outputs.pm2_info }}
          PM2_LOGS: ${{ steps.pm2_logs.outputs.pm2_logs }}
          COMMIT_SHA: ${{ steps.commit_info.outputs.commit_sha }}
          COMMIT_MESSAGE: ${{ steps.commit_info.outputs.commit_message }}
        run: |
          English content normalized from the original source text.
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "English content normalized from the original source text."
            exit 1
          else
            echo "English content normalized from the original source text."
          fi

          English content normalized from the original source text.
          sudo apt-get update && sudo apt-get install -y jq

          COLOR=3066993
          ICON="✅"
          if [ "$STATUS" != "success" ]; then
            COLOR=15158332
            ICON="❌"
          fi

          English content normalized from the original source text.
          ESCAPED_LOGS=$(echo "${PM2_LOGS:0:1500}" | jq -s -R .)
          ESCAPED_PM2_INFO=$(echo "$PM2_INFO" | jq -s -R .)
          ESCAPED_COMMIT_MESSAGE="$COMMIT_MESSAGE"

          English content normalized from the original source text.
          JSON_PAYLOAD=$(jq -n \
            --arg status "$STATUS" \
            --arg icon "$ICON" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg commit_message "$ESCAPED_COMMIT_MESSAGE" \
            --arg repo "$REPO" \
            --arg actor "$ACTOR" \
            --arg pm2_info "$ESCAPED_PM2_INFO" \
            --arg logs "$ESCAPED_LOGS" \
            --arg run_id "$RUN_ID" \
            --arg color "$COLOR" \
            'English content normalized from the original source text.')

          English content normalized from the original source text.
          echo "JSON Payload: $JSON_PAYLOAD"

          English content normalized from the original source text.
          RESPONSE=$(curl -s -w "%{http_code}" -H "Content-Type: application/json" -X POST -d "$JSON_PAYLOAD" "$DISCORD_WEBHOOK")
          HTTP_CODE=${RESPONSE: -3}
          RESPONSE_BODY=${RESPONSE%???}

          echo "English content normalized from the original source text."
          echo "English content normalized from the original source text."

          if [ "$HTTP_CODE" != "204" ]; then
            echo "English content normalized from the original source text."
            exit 1
          fi

  # 3. Automatic Rollback on Failure
  rollback-auto:
    name: Automatic Rollback
    needs: deploy
    runs-on: ubuntu-latest
    if: needs.deploy.result == 'failure'
    steps:
      - name: Rollback to previous commit on server
        run: |
          sshpass -p "${{ secrets.STAGING_VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_VPS_USERNAME }}@${{ secrets.STAGING_VPS_IP_HOST }} << 'EOF'
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            source ~/.bashrc; source ~/.profile
            cd ${{ secrets.STAGING_PATH_PROJECT }}
            git fetch origin master
            git reset --hard HEAD~1
            rm -rf dist node_modules
            npm ci && npm run build
            pm2 restart client-ecsite
          EOF

  # 4. Manual Rollback
  manual-rollback:
    name: Manual Rollback
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.manual_rollback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout specific commit/tag
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.manual_rollback }}

      - name: Re-deploy to VPS
        run: |
          sshpass -p "${{ secrets.STAGING_VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_VPS_USERNAME }}@${{ secrets.STAGING_VPS_IP_HOST }} << 'EOF'
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            source ~/.bashrc; source ~/.profile
            cd ${{ secrets.STAGING_PATH_PROJECT }}
            git reset --hard HEAD
            rm -rf dist node_modules
            npm ci && npm run build
            pm2 restart client-ecsite
          EOF

permissions:
  contents: write