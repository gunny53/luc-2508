services:
  postgres:
    image: postgres:16-alpine
    container_name: ecsite_postgres
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initial-script/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecsite-network

  pgbouncer:
    image: edoburu/pgbouncer:1.18.0
    container_name: ecsite_pgbouncer
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - '${PGBOUNCER_PORT:-6432}:6432'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecsite-network

  redis:
    image: redis:7-alpine
    container_name: ecsite_redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecsite-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ecsite_elasticsearch
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:-'-Xms512m -Xmx512m'}
    ports:
      - '${ELASTICSEARCH_PORT:-9200}:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9200/_cluster/health || exit 1']
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - ecsite-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: ecsite_kibana
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: 'false'
    ports:
      - '${KIBANA_PORT:-5601}:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ecsite-network

volumes:
  postgres_data:
    name: ecsite_postgres_data
  redis_data:
    name: ecsite_redis_data
  elasticsearch_data:
    name: ecsite_elasticsearch_data

networks:
  ecsite-network:
    name: ecsite_network
    driver: bridge
