global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@ecsite.com'

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 1m
  repeat_interval: 2h
  receiver: 'web.hook'
  routes:
    - match:
        severity: critical
      receiver: 'critical-notifications'
      group_wait: 0s
      group_interval: 30s
      repeat_interval: 10m
      continue: true

    - match:
        service: api-server
      receiver: 'performance-notifications'
      group_wait: 1m
      group_interval: 1m
      repeat_interval: 30m
      continue: true

    - match:
        service: postgresql
      receiver: 'database-notifications'
      group_wait: 1m
      group_interval: 1m
      repeat_interval: 30m
      continue: true

inhibit_rules:
  - source_match:
      severity: 'critical'
      alertname: 'ServiceDown'
    target_match:
      severity: 'critical'
    equal: ['instance', 'service']

receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://127.0.0.1:5001/'
        send_resolved: true

  - name: 'critical-notifications'
    webhook_configs:
      - url: 'http://127.0.0.1:5001/critical'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK'
        channel: '#alerts-critical'
        title: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        send_resolved: true

  - name: 'performance-notifications'
    webhook_configs:
      - url: 'http://127.0.0.1:5001/performance'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK'
        channel: '#alerts-performance'
        title: '⚡ PERFORMANCE ALERT: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        send_resolved: true

  - name: 'database-notifications'
    webhook_configs:
      - url: 'http://127.0.0.1:5001/database'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK'
        channel: '#alerts-database'
        title: '🗄️ DATABASE ALERT: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        send_resolved: true

templates:
  - '/etc/alertmanager/template/*.tmpl'
